version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hospital-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hospital
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: hospital123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hospital"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
